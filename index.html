<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Game Collection | Free Browser Games</title>
    <meta name="description" content="Play free browser-based mini games — action, puzzle, and creative games. No download or login required. 15 games available!" />
    <link rel="canonical" href="https://game.wookingwoo.com/" />
    <meta property="og:title" content="Mini Game Collection | Free Browser Games" />
    <meta property="og:description" content="Play free browser-based mini games — action, puzzle, and creative games. No download or login required. 14 games available!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.wookingwoo.com/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Mini Game Collection | Free Browser Games" />
    <meta name="twitter:description" content="Play free browser-based mini games — action, puzzle, and creative games. No download or login required. 14 games available!" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Mini Game Collection</h1>
        <p class="subtitle">Choose your favorite game to play!</p>
        <span class="game-count" id="game-count"></span>
      </header>

      <div class="controls">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="search-input"
            placeholder="Search games..."
            oninput="filterGames()"
          />
        </div>
        <div class="filter-buttons">
          <button class="filter-btn active" data-category="all" onclick="setCategory(this)">All</button>
          <button class="filter-btn" data-category="action" onclick="setCategory(this)">Action</button>
          <button class="filter-btn" data-category="puzzle" onclick="setCategory(this)">Puzzle</button>
          <button class="filter-btn" data-category="creative" onclick="setCategory(this)">Creative</button>
        </div>
      </div>

      <div class="game-menu" id="game-menu"></div>

      <p class="no-results" id="no-results" style="display:none">No games found.</p>

      <div id="game-container" style="display: none">
        <div class="game-header">
          <button id="back-btn" onclick="returnToMenu()">← Back</button>
          <h2 id="current-game-title"></h2>
          <button id="fullscreen-btn" onclick="toggleFullscreen()">🔳 Fullscreen</button>
        </div>
        <iframe id="game-frame" src="" frameborder="0"></iframe>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
