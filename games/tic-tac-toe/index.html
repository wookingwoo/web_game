<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Online | Play vs AI or Friend | Mini Game Collection</title>
    <meta name="description" content="Play Tic-Tac-Toe online for free! Challenge the AI or play with a friend. 3 difficulty levels. Classic X and O game." />
    <meta name="keywords" content="tic tac toe, tic-tac-toe online, noughts and crosses, X O game, two player game, AI game, free online game" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://game.wookingwoo.com/games/tic-tac-toe/" />
    <meta property="og:title" content="Tic-Tac-Toe Online | Play vs AI or Friend" />
    <meta property="og:description" content="Play Tic-Tac-Toe online for free! Challenge the AI or play with a friend." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.wookingwoo.com/games/tic-tac-toe/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tic-Tac-Toe Online | Play vs AI or Friend" />
    <meta name="twitter:description" content="Play Tic-Tac-Toe online for free! Challenge the AI or play with a friend." />
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"VideoGame","name":"Tic-Tac-Toe","description":"Classic X and O game with AI opponent","genre":"Strategy","playMode":["SinglePlayer","MultiPlayer"],"applicationCategory":"Game","operatingSystem":"Web Browser"}
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>⭕❌ 틱택토</h1>
            <p class="subtitle">TIC-TAC-TOE</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="ai">🤖 vs AI</button>
            <button class="mode-btn" data-mode="2p">👥 2인 대전</button>
        </div>

        <div class="game-info">
            <div class="player-info player-x">
                <span class="player-symbol">❌</span>
                <span class="player-name">Player 1</span>
                <span id="scoreX" class="player-score">0</span>
            </div>
            <div class="player-info draw">
                <span class="player-symbol">➖</span>
                <span class="player-name">무승부</span>
                <span id="scoreDraw" class="player-score">0</span>
            </div>
            <div class="player-info player-o">
                <span class="player-symbol">⭕</span>
                <span id="playerOName" class="player-name">AI</span>
                <span id="scoreO" class="player-score">0</span>
            </div>
        </div>

        <div id="status" class="status">❌ 차례입니다</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="restart-btn" onclick="resetGame()">🔄 새 게임</button>

        <div class="difficulty-selector" id="difficultySelector">
            <p>AI 난이도</p>
            <div class="difficulty-buttons">
                <button class="diff-btn" data-diff="easy">쉬움</button>
                <button class="diff-btn active" data-diff="medium">보통</button>
                <button class="diff-btn" data-diff="hard">어려움</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
