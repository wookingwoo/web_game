<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumping Ball Runner | Mini Game Collection</title>
    <meta name="description" content="Jump over obstacles as a rolling ball. How long can you keep the ball alive?" />
    <link rel="canonical" href="https://game.wookingwoo.com/games/jumping-ball-runner/" />
    <meta property="og:title" content="Jumping Ball Runner | Mini Game Collection" />
    <meta property="og:description" content="Jump over obstacles as a rolling ball. How long can you keep the ball alive?" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.wookingwoo.com/games/jumping-ball-runner/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Jumping Ball Runner | Mini Game Collection" />
    <meta name="twitter:description" content="Jump over obstacles as a rolling ball. How long can you keep the ball alive?" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-info">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="gameOver" class="game-over hidden">
            <h2>Game Over!</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
        <div class="controls">
            <p>Press SPACE or UP ARROW to jump</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
