<body>
    <div class="game-container">
        <div class="game-header">
            <h1>⚡ REACTION TIME TEST</h1>

        <div class="stats-container">
            <div class="stat-box">

                <span id="bestTime" class="stat-value">- ms</span>

                <span class="stat-label">Average</span>
                <span id="avgTime" class="stat-value">- ms</span>

                <span class="stat-label">Attempts</span>
                <span id="attempts" class="stat-value">0/5</span>
            </div>
        </div>

        <div id="gameArea" class="game-area waiting">
            <div class="game-content">
                <div id="icon" class="icon">🎯</div>
                <h2 id="message">Click to Start</h2>
                <p id="subMessage">When the screen turns green, click as fast as you can!</p>
            </div>
        </div>

        <div class="results-container hidden" id="resultsContainer">
            <h3>📊 Results</h3>
            <div id="resultsList" class="results-list"></div>
            <div class="final-result">
                <p>Average reaction time: <span id="finalAvg">0</span>ms</p>

            <button class="restart-btn" onclick="resetGame()">Test Again</button>
