    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"VideoGame","name":"Number Guessing","description":"Guess the number with up/down hints","genre":"Puzzle","playMode":"SinglePlayer","applicationCategory":"Game","operatingSystem":"Web Browser","url":"https://game.wookingwoo.com/games/number-guessing/"}
    </script>
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://game.wookingwoo.com/"},{"@type":"ListItem","position":2,"name":"Number Guessing","item":"https://game.wookingwoo.com/games/number-guessing/"}]}
    </script>

</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🔢 NUMBER GUESSING</h1>
            <p class="subtitle">Up &amp; Down</p>
        </div>

        <div class="game-info">
            <div class="info-box">
                <span class="info-label">Attempts</span>
                <span id="attempts" class="info-value">0</span>
            </div>
            <div class="info-box">
                <span class="info-label">Range</span>
                <span id="range" class="info-value">1-100</span>
            </div>
            <div class="info-box">
                <span class="info-label">Best</span>
                <span id="bestScore" class="info-value">-</span>
            </div>
        </div>

        <div id="hint" class="hint">Guess a number between 1 and 100!</div>

        <div class="guess-history" id="guessHistory"></div>

        <div class="input-section">
            <input type="number" id="guessInput" min="1" max="100" placeholder="Enter number">
            <button id="guessBtn" onclick="makeGuess()">Guess</button>
        </div>

        <div class="number-pad">
            <button class="num-btn" onclick="appendNumber(1)">1</button>
            <button class="num-btn" onclick="appendNumber(2)">2</button>
            <button class="num-btn" onclick="appendNumber(3)">3</button>
            <button class="num-btn" onclick="appendNumber(4)">4</button>
            <button class="num-btn" onclick="appendNumber(5)">5</button>
            <button class="num-btn" onclick="appendNumber(6)">6</button>
            <button class="num-btn" onclick="appendNumber(7)">7</button>
            <button class="num-btn" onclick="appendNumber(8)">8</button>
            <button class="num-btn" onclick="appendNumber(9)">9</button>
            <button class="num-btn clear" onclick="clearInput()">C</button>
            <button class="num-btn" onclick="appendNumber(0)">0</button>
            <button class="num-btn enter" onclick="makeGuess()">⏎</button>
        </div>

        <button class="restart-btn" onclick="resetGame()">🔄 New Game</button>

        <div id="winOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>🎉 Correct!</h2>
                <p>The number was <span id="answer">0</span>!</p>
                <p>You got it in <span id="finalAttempts">0</span> attempts!</p>
                <p id="newRecord" class="hidden">🏆 New Record!</p>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
