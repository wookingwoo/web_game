<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🔢 SUDOKU</h1>
            <p class="subtitle">Classic Number Puzzle</p>
        </div>

        <div class="difficulty-selector">
            <button class="diff-btn active" data-difficulty="easy">Easy</button>
            <button class="diff-btn" data-difficulty="medium">Medium</button>
            <button class="diff-btn" data-difficulty="hard">Hard</button>
        </div>

        <div class="game-info">
            <div class="info-box">
                <span class="info-icon">⏱️</span>
                <span id="timer" class="info-value">00:00</span>
            </div>
            <div class="info-box">
                <span class="info-icon">❌</span>
                <span id="mistakes" class="info-value">0/3</span>
            </div>
        </div>

        <div class="board-container">
            <div id="gameBoard" class="game-board"></div>
        </div>

        <div class="number-pad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn erase" data-num="0">⌫</button>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="newGame()">🔄 New Game</button>
            <button class="control-btn hint-btn" onclick="getHint()">💡 Hint</button>
        </div>

        <div id="winOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>🎉 Congratulations!</h2>
                <p>Puzzle complete!</p>
                <p>Time: <span id="finalTime">00:00</span></p>
                <button onclick="newGame()">New Game</button>
            </div>
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>😢 Game Over</h2>
                <p>3 mistakes — better luck next time!</p>
                <button onclick="newGame()">Play Again</button>
            </div>
        </div>
    </div>
