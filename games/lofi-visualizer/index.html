<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lo-Fi Visualizer | Mini Game Collection</title>
  <meta name="description" content="Relax with an animated audio visualizer featuring bars and waves over a lo-fi vaporwave track." />
  <link rel="canonical" href="https://game.wookingwoo.com/games/lofi-visualizer/" />
  <meta property="og:title" content="Lo-Fi Visualizer | Mini Game Collection" />
  <meta property="og:description" content="Relax with an animated audio visualizer featuring bars and waves over a lo-fi vaporwave track." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://game.wookingwoo.com/games/lofi-visualizer/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Lo-Fi Visualizer | Mini Game Collection" />
  <meta name="twitter:description" content="Relax with an animated audio visualizer featuring bars and waves over a lo-fi vaporwave track." />
  <link rel="stylesheet" href="visualizer.css">
</head>
<body>
  <div class="window">
    <div class="title-bar">
      <span class="title">Lo-Fi Visualiser</span>
      <div class="window-buttons">
        <button class="pixel-btn"></button>
        <button class="pixel-btn"></button>
        <button class="pixel-btn"></button>
      </div>
    </div>
    <div class="content">
      <canvas id="viz"></canvas>
      <div class="controls">
        <label>Style
          <select id="style">
            <option value="bars">Bars</option>
            <option value="dots">Dots</option>
            <option value="grid">Grid</option>
          </select>
        </label>
        <label>Speed
          <input type="range" id="speed" min="0.5" max="3" step="0.1" value="1">
        </label>
        <label>Density
          <input type="range" id="density" min="16" max="128" step="1" value="64">
        </label>
        <label>Glow
          <input type="range" id="glow" min="0" max="25" step="1" value="10">
        </label>
        <label>Hue
          <input type="color" id="hue" value="#00ffff">
        </label>
      </div>
      <button id="start-btn">Play</button>
    </div>
  </div>
  <script src="visualizer.js"></script>
</body>
</html>
