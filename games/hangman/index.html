<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="twitter:card" content="summary" />

    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"VideoGame","name":"Hangman","description":"Classic word guessing game","genre":"Word Game","playMode":"SinglePlayer","applicationCategory":"Game","operatingSystem":"Web Browser","url":"https://game.wookingwoo.com/games/hangman/"}
    </script>
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://game.wookingwoo.com/"},{"@type":"ListItem","position":2,"name":"Hangman","item":"https://game.wookingwoo.com/games/hangman/"}]}
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>😵 HANGMAN</h1>
            <p class="subtitle">Word Guessing Game</p>
        </div>

        <div class="game-info">
            <div class="info-box">
                <span class="info-label">Category</span>
                <span id="category" class="info-value">-</span>
            </div>
            <div class="info-box">
                <span class="info-label">Chances Left</span>
                <span id="lives" class="info-value">6</span>
            </div>
        </div>

        <div class="hangman-area">
            <svg id="hangman" viewBox="0 0 200 250" class="hangman-svg">
                <!-- Base -->
                <line x1="20" y1="230" x2="100" y2="230" stroke="#ecf0f1" stroke-width="4"/>
                <!-- Pole -->
                <line x1="60" y1="230" x2="60" y2="20" stroke="#ecf0f1" stroke-width="4"/>
                <!-- Top -->
                <line x1="60" y1="20" x2="140" y2="20" stroke="#ecf0f1" stroke-width="4"/>
                <!-- Rope -->
                <line x1="140" y1="20" x2="140" y2="50" stroke="#ecf0f1" stroke-width="4"/>

                <!-- Body parts (hidden by default) -->
                <circle id="head" cx="140" cy="70" r="20" stroke="#e74c3c" stroke-width="4" fill="none" class="hidden"/>
                <line id="body" x1="140" y1="90" x2="140" y2="150" stroke="#e74c3c" stroke-width="4" class="hidden"/>
                <line id="leftArm" x1="140" y1="110" x2="110" y2="140" stroke="#e74c3c" stroke-width="4" class="hidden"/>
                <line id="rightArm" x1="140" y1="110" x2="170" y2="140" stroke="#e74c3c" stroke-width="4" class="hidden"/>
                <line id="leftLeg" x1="140" y1="150" x2="110" y2="200" stroke="#e74c3c" stroke-width="4" class="hidden"/>
                <line id="rightLeg" x1="140" y1="150" x2="170" y2="200" stroke="#e74c3c" stroke-width="4" class="hidden"/>
            </svg>
        </div>

        <div id="wordDisplay" class="word-display">_ _ _ _ _</div>

        <div id="wrongLetters" class="wrong-letters"></div>

        <div id="keyboard" class="keyboard">
            <div class="keyboard-row">
                <button class="key" data-letter="A">A</button>
                <button class="key" data-letter="B">B</button>
                <button class="key" data-letter="C">C</button>
                <button class="key" data-letter="D">D</button>
                <button class="key" data-letter="E">E</button>
                <button class="key" data-letter="F">F</button>
                <button class="key" data-letter="G">G</button>
            </div>
            <div class="keyboard-row">
                <button class="key" data-letter="H">H</button>
                <button class="key" data-letter="I">I</button>
                <button class="key" data-letter="J">J</button>
                <button class="key" data-letter="K">K</button>
                <button class="key" data-letter="L">L</button>
                <button class="key" data-letter="M">M</button>
                <button class="key" data-letter="N">N</button>
            </div>
            <div class="keyboard-row">
                <button class="key" data-letter="O">O</button>
                <button class="key" data-letter="P">P</button>
                <button class="key" data-letter="Q">Q</button>
                <button class="key" data-letter="R">R</button>
                <button class="key" data-letter="S">S</button>
                <button class="key" data-letter="T">T</button>
                <button class="key" data-letter="U">U</button>
            </div>
            <div class="keyboard-row">
                <button class="key" data-letter="V">V</button>
                <button class="key" data-letter="W">W</button>
                <button class="key" data-letter="X">X</button>
                <button class="key" data-letter="Y">Y</button>
                <button class="key" data-letter="Z">Z</button>
            </div>
        </div>

        <button class="restart-btn" onclick="startNewGame()">🔄 New Game</button>

        <div id="gameOverOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h2 id="resultTitle">😢 Game Over</h2>
                <p>Answer: <span id="correctWord">WORD</span></p>
                <button onclick="startNewGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
