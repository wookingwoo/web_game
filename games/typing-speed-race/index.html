<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Speed Race | Mini Game Collection</title>
    <meta name="description" content="Test your typing speed and accuracy under time pressure. Improve your WPM score!" />
    <link rel="canonical" href="https://game.wookingwoo.com/games/typing-speed-race/" />
    <meta property="og:title" content="Typing Speed Race | Mini Game Collection" />
    <meta property="og:description" content="Test your typing speed and accuracy under time pressure. Improve your WPM score!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.wookingwoo.com/games/typing-speed-race/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Typing Speed Race | Mini Game Collection" />
    <meta name="twitter:description" content="Test your typing speed and accuracy under time pressure. Improve your WPM score!" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="overlay" class="overlay hidden">
      <div id="countdown" class="countdown"></div>
    </div>
    <div class="container">
      <h1>Typing Speed Race</h1>
      <div id="paragraph" class="paragraph"></div>
      <textarea id="input" disabled placeholder="Start typing here..."></textarea>
      <div class="stats">
        <div>Time: <span id="time">60</span>s</div>
        <div>WPM: <span id="wpm">0</span></div>
        <div>Accuracy: <span id="accuracy">100</span>%</div>
      </div>
      <button id="start-btn">Start Race</button>
      <canvas id="historyChart" width="400" height="200"></canvas>
    </div>
    <script src="game.js"></script>
  </body>
</html>
