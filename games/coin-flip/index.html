<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Online | Heads or Tails | Mini Game Collection</title>
    <meta name="description" content="Flip a coin online! Heads or tails betting game with animations. Track your win streak and statistics. Free random coin flipper." />
    <meta name="keywords" content="coin flip, coin toss, heads or tails, random coin, flip a coin, betting game, luck game, decision maker" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://game.wookingwoo.com/games/coin-flip/" />
    <meta property="og:title" content="Coin Flip Online | Heads or Tails" />
    <meta property="og:description" content="Flip a coin online! Heads or tails betting game with animations." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.wookingwoo.com/games/coin-flip/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Coin Flip Online | Heads or Tails" />
    <meta name="twitter:description" content="Flip a coin online! Free random coin flipper." />
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"VideoGame","name":"Coin Flip","description":"Heads or tails betting game","genre":"Casual","playMode":"SinglePlayer","applicationCategory":"Game","operatingSystem":"Web Browser"}
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🪙 동전 던지기</h1>
            <p class="subtitle">COIN FLIP</p>
        </div>

        <div class="game-info">
            <div class="info-box">
                <span class="info-label">COINS</span>
                <span id="coins" class="info-value">100</span>
            </div>
            <div class="info-box">
                <span class="info-label">WIN STREAK</span>
                <span id="streak" class="info-value">0</span>
            </div>
        </div>

        <div class="coin-container">
            <div id="coin" class="coin">
                <div class="coin-face front">👑</div>
                <div class="coin-face back">🌙</div>
            </div>
        </div>

        <div id="result" class="result"></div>

        <div class="bet-section">
            <p class="bet-label">배팅 금액</p>
            <div class="bet-buttons">
                <button class="bet-btn" data-bet="10">10</button>
                <button class="bet-btn active" data-bet="25">25</button>
                <button class="bet-btn" data-bet="50">50</button>
                <button class="bet-btn" data-bet="100">ALL IN</button>
            </div>
        </div>

        <div class="choice-section">
            <p class="choice-label">예측을 선택하세요</p>
            <div class="choice-buttons">
                <button class="choice-btn heads" onclick="flipCoin('heads')">
                    <span class="choice-icon">👑</span>
                    <span class="choice-text">앞면</span>
                </button>
                <button class="choice-btn tails" onclick="flipCoin('tails')">
                    <span class="choice-icon">🌙</span>
                    <span class="choice-text">뒷면</span>
                </button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">앞면: <span id="headsCount">0</span></div>
            <div class="stat">뒷면: <span id="tailsCount">0</span></div>
            <div class="stat">승률: <span id="winRate">0</span>%</div>
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>💸 파산!</h2>
                <p>코인이 모두 소진되었습니다.</p>
                <button onclick="resetGame()">다시 시작</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
