<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🪙 COIN FLIP</h1>
            <p class="subtitle">Heads or Tails?</p>
        </div>

        <div class="game-info">
            <div class="info-box">
                <span class="info-label">COINS</span>
                <span id="coins" class="info-value">100</span>
            </div>
            <div class="info-box">
                <span class="info-label">WIN STREAK</span>
                <span id="streak" class="info-value">0</span>
            </div>
        </div>

        <div class="coin-container">
            <div id="coin" class="coin">
                <div class="coin-face front">👑</div>
                <div class="coin-face back">🌙</div>
            </div>
        </div>

        <div id="result" class="result"></div>

        <div class="bet-section">
            <p class="bet-label">Bet Amount</p>
            <div class="bet-buttons">
                <button class="bet-btn" data-bet="10">10</button>
                <button class="bet-btn active" data-bet="25">25</button>
                <button class="bet-btn" data-bet="50">50</button>
                <button class="bet-btn" data-bet="100">ALL IN</button>
            </div>
        </div>

        <div class="choice-section">
            <p class="choice-label">Choose your prediction</p>
            <div class="choice-buttons">
                <button class="choice-btn heads" onclick="flipCoin('heads')">
                    <span class="choice-icon">👑</span>
                    <span class="choice-text">Heads</span>
                </button>
                <button class="choice-btn tails" onclick="flipCoin('tails')">
                    <span class="choice-icon">🌙</span>
                    <span class="choice-text">Tails</span>
                </button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">Heads: <span id="headsCount">0</span></div>
            <div class="stat">Tails: <span id="tailsCount">0</span></div>
            <div class="stat">Win Rate: <span id="winRate">0</span>%</div>
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>💸 Bankrupt!</h2>
                <p>You ran out of coins.</p>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
