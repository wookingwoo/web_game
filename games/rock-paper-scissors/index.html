<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors | Mini Game Collection</title>
    <meta name="description" content="Challenge the AI in the classic game of Rock Paper Scissors! Track your wins and beat the computer." />
    <link rel="canonical" href="https://game.wookingwoo.com/games/rock-paper-scissors/" />
    <meta property="og:title" content="Rock Paper Scissors | Mini Game Collection" />
    <meta property="og:description" content="Challenge the AI in the classic game of Rock Paper Scissors! Track your wins and beat the computer." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.wookingwoo.com/games/rock-paper-scissors/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Rock Paper Scissors | Mini Game Collection" />
    <meta name="twitter:description" content="Challenge the AI in the classic game of Rock Paper Scissors! Track your wins and beat the computer." />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>✊ ROCK PAPER SCISSORS</h1>
            <p class="subtitle">VS AI</p>
        </div>

        <!-- 점수판 -->
        <div class="scoreboard">
            <div class="score-box player-score">
                <span class="score-label">YOU</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="score-box draws">
                <span class="score-label">DRAWS</span>
                <span class="score-value" id="draws">0</span>
            </div>
            <div class="score-box ai-score">
                <span class="score-label">AI</span>
                <span class="score-value" id="aiScore">0</span>
            </div>
        </div>

        <!-- 최고 연승 기록 -->
        <div class="best-streak">
            <span>🔥 Best Streak: <strong id="bestStreak">0</strong></span>
            <span class="current-streak">Current: <strong id="currentStreak">0</strong></span>
        </div>

        <!-- 게임 영역 -->
        <div class="game-area">
            <!-- 선택 표시 영역 -->
            <div class="battle-area">
                <div class="choice-display player-choice">
                    <span class="choice-emoji" id="playerChoiceEmoji">❓</span>
                    <span class="choice-name">YOU</span>
                </div>
                <div class="vs-text">VS</div>
                <div class="choice-display ai-choice">
                    <span class="choice-emoji" id="aiChoiceEmoji">❓</span>
                    <span class="choice-name">AI</span>
                </div>
            </div>

            <!-- 결과 표시 -->
            <div class="result-display hidden" id="resultDisplay">
                <span class="result-text" id="resultText"></span>
            </div>

            <!-- 카운트다운 -->
            <div class="countdown hidden" id="countdown">
                <span class="countdown-text" id="countdownText"></span>
            </div>
        </div>

        <!-- 선택 버튼 -->
        <div class="choices">
            <button class="choice-btn" data-choice="rock" onclick="playRound('rock')">
                <span class="btn-emoji">✊</span>
                <span class="btn-text">Rock</span>
            </button>
            <button class="choice-btn" data-choice="paper" onclick="playRound('paper')">
                <span class="btn-emoji">🖐️</span>
                <span class="btn-text">Paper</span>
            </button>
            <button class="choice-btn" data-choice="scissors" onclick="playRound('scissors')">
                <span class="btn-emoji">✌️</span>
                <span class="btn-text">Scissors</span>
            </button>
        </div>

        <!-- 게임 히스토리 -->
        <div class="history-section">
            <span class="history-label">Recent:</span>
            <div class="history-items" id="historyItems">
                <span class="history-empty">Play to start!</span>
            </div>
        </div>

        <!-- 컨트롤 버튼 -->
        <div class="game-controls">
            <button class="control-btn reset" onclick="resetGame()">🔄 Reset Game</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
