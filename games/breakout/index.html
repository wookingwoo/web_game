<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🧱 벽돌깨기</h1>
            <p class="subtitle">BREAKOUT</p>
        </div>

        <div class="game-info">
            <div class="info-box">
                <span class="info-label">SCORE</span>
                <span id="score" class="info-value">0</span>
            </div>
            <div class="info-box">
                <span class="info-label">LEVEL</span>
                <span id="level" class="info-value">1</span>
            </div>
            <div class="info-box">
                <span class="info-label">LIVES</span>
                <span id="lives" class="info-value">❤️❤️❤️</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="480" height="600"></canvas>
            
            <div id="startScreen" class="overlay-screen">
                <h2>🧱 벽돌깨기</h2>
                <p>마우스 또는 방향키로 패들 조작</p>
                <button onclick="startGame()">시작하기</button>
            </div>

            <div id="gameOverScreen" class="overlay-screen hidden">
                <h2>Game Over</h2>
                <p>최종 점수: <span id="finalScore">0</span></p>
                <button onclick="restartGame()">다시 하기</button>
            </div>

            <div id="winScreen" class="overlay-screen hidden">
                <h2>🎉 클리어!</h2>
                <p>레벨 <span id="clearedLevel">1</span> 클리어!</p>
                <button onclick="nextLevel()">다음 레벨</button>
            </div>
        </div>

        <div class="instructions">
            <p>🖱️ 마우스 / ⬅️➡️ 방향키로 패들 이동</p>
        </div>
    </div>
