<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodge the Poop | Mini Game Collection</title>
    <meta name="description" content="Dodge falling poop and survive as long as possible. A hilarious browser action game!" />
    <link rel="canonical" href="https://game.wookingwoo.com/games/dodge-the-poop/" />
    <meta property="og:title" content="Dodge the Poop | Mini Game Collection" />
    <meta property="og:description" content="Dodge falling poop and survive as long as possible. A hilarious browser action game!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.wookingwoo.com/games/dodge-the-poop/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Dodge the Poop | Mini Game Collection" />
    <meta name="twitter:description" content="Dodge falling poop and survive as long as possible. A hilarious browser action game!" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-info">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="lives">Lives: <span id="lives">3</span></div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="gameOver" class="game-over hidden">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
        
        <div class="controls">
            <p>Use ARROW KEYS or WASD to move</p>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
